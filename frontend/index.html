<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — Chatbot Infraestructura</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
      padding: 2.5rem 2rem;
      width: min(420px, 94vw);
    }

    .card h1 {
      font-size: 1.4rem;
      color: #1a1a2e;
      text-align: center;
      margin-bottom: 0.25rem;
    }

    .card .subtitle {
      font-size: 0.85rem;
      color: #6b7280;
      text-align: center;
      margin-bottom: 2rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-bottom: 1rem;
    }

    .field label {
      font-size: 0.82rem;
      font-weight: 600;
      color: #374151;
    }

    .field input {
      padding: 0.6rem 0.85rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus { border-color: #4f46e5; }

    .btn {
      width: 100%;
      padding: 0.7rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn:disabled { opacity: 0.6; cursor: default; }

    .btn-primary {
      background: #4f46e5;
      color: #fff;
      margin-bottom: 0.6rem;
    }

    .btn-primary:hover:not(:disabled) { background: #4338ca; }

    .btn-secondary {
      background: #f3f4f6;
      color: #1a1a2e;
      margin-bottom: 1.25rem;
    }

    .btn-secondary:hover:not(:disabled) { background: #e5e7eb; }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      color: #9ca3af;
      font-size: 0.8rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    .btn-google {
      background: #fff;
      color: #374151;
      border: 1px solid #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }

    .btn-google:hover:not(:disabled) { background: #f9fafb; }

    .btn-google svg { flex-shrink: 0; }

    .error-msg {
      display: none;
      margin-top: 1rem;
      padding: 0.65rem 0.85rem;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      color: #b91c1c;
      font-size: 0.85rem;
      line-height: 1.4;
    }

    .error-msg.visible { display: block; }
  </style>
</head>
<body>

<div class="card">
  <h1>Chatbot Infraestructura</h1>
  <p class="subtitle">Asistente cloud con IA</p>

  <form id="auth-form" novalidate>
    <div class="field">
      <label for="email">Correo electrónico</label>
      <input id="email" type="email" placeholder="tu@correo.com" autocomplete="email" required />
    </div>

    <div class="field">
      <label for="password">Contraseña</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
    </div>

    <button id="btn-login" type="submit" class="btn btn-primary">Iniciar sesión</button>
    <button id="btn-register" type="button" class="btn btn-secondary">Registrarse</button>
  </form>

  <div class="divider">o</div>

  <button id="btn-google" type="button" class="btn btn-google">
    <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Continuar con Google
  </button>

  <div id="error-msg" class="error-msg" role="alert"></div>
</div>

<script type="module">
  import { initializeApp }        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth,
    onAuthStateChanged,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    signInWithPopup,
    GoogleAuthProvider,
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  // -------------------------------------------------------------------------
  // Firebase config — valores del proyecto "chatboot-infraestructura"
  // Los tres primeros se derivan del project_id.
  // apiKey, messagingSenderId y appId: consola Firebase →
  //   Configuración del proyecto → General → Tus apps → App web → Configuración del SDK
  // -------------------------------------------------------------------------
  const firebaseConfig = {
    apiKey:            "AIzaSyCteU0NzqHKfJI8a4IZL_OC9YV_Paw7Pvs",
    authDomain:        "chatboot-infraestructura.firebaseapp.com",
    projectId:         "chatboot-infraestructura",
    storageBucket:     "chatboot-infraestructura.firebasestorage.app",
    messagingSenderId: "9738095222",
    appId:             "1:9738095222:web:a5ac492abbb4165321ed57",
  };

  const app      = initializeApp(firebaseConfig);
  const auth     = getAuth(app);
  const provider = new GoogleAuthProvider();

  // -------------------------------------------------------------------------
  // UI helpers
  // -------------------------------------------------------------------------
  const errorEl  = document.getElementById("error-msg");
  const btnLogin = document.getElementById("btn-login");
  const btnReg   = document.getElementById("btn-register");
  const btnGoog  = document.getElementById("btn-google");

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.classList.add("visible");
  }

  function clearError() {
    errorEl.textContent = "";
    errorEl.classList.remove("visible");
  }

  function setLoading(on) {
    [btnLogin, btnReg, btnGoog].forEach(b => (b.disabled = on));
  }

  function friendlyError(code) {
    const map = {
      "auth/invalid-email":           "El correo electrónico no es válido.",
      "auth/user-not-found":          "No existe una cuenta con ese correo.",
      "auth/wrong-password":          "Contraseña incorrecta.",
      "auth/invalid-credential":      "Credenciales incorrectas. Verifica tu correo y contraseña.",
      "auth/email-already-in-use":    "Ya existe una cuenta con ese correo.",
      "auth/weak-password":           "La contraseña debe tener al menos 6 caracteres.",
      "auth/popup-closed-by-user":    "Ventana de Google cerrada antes de completar el acceso.",
      "auth/network-request-failed":  "Error de red. Comprueba tu conexión.",
      "auth/too-many-requests":       "Demasiados intentos. Espera unos minutos e inténtalo de nuevo.",
    };
    return map[code] || `Error inesperado (${code}).`;
  }

  // -------------------------------------------------------------------------
  // Redirect if already signed in
  // -------------------------------------------------------------------------
  onAuthStateChanged(auth, async user => {
    if (user) {
      const token = await user.getIdToken(/* forceRefresh= */ false);
      sessionStorage.setItem("firebase_token", token);
      window.location.href = "chat.html";
    }
  });

  // -------------------------------------------------------------------------
  // After successful sign-in
  // -------------------------------------------------------------------------
  async function handleSuccess(userCredential) {
    const token = await userCredential.user.getIdToken();
    sessionStorage.setItem("firebase_token", token);
    window.location.href = "chat.html";
  }

  // -------------------------------------------------------------------------
  // Email / Password — Login
  // -------------------------------------------------------------------------
  document.getElementById("auth-form").addEventListener("submit", async e => {
    e.preventDefault();
    clearError();

    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (!email || !password) {
      showError("Completa el correo y la contraseña.");
      return;
    }

    setLoading(true);
    try {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      await handleSuccess(cred);
    } catch (err) {
      showError(friendlyError(err.code));
    } finally {
      setLoading(false);
    }
  });

  // -------------------------------------------------------------------------
  // Email / Password — Register
  // -------------------------------------------------------------------------
  btnReg.addEventListener("click", async () => {
    clearError();

    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (!email || !password) {
      showError("Completa el correo y la contraseña para registrarte.");
      return;
    }

    setLoading(true);
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      // Auto sign-in after registration
      await handleSuccess(cred);
    } catch (err) {
      showError(friendlyError(err.code));
    } finally {
      setLoading(false);
    }
  });

  // -------------------------------------------------------------------------
  // Google Sign-In
  // -------------------------------------------------------------------------
  btnGoog.addEventListener("click", async () => {
    clearError();
    setLoading(true);
    try {
      const cred = await signInWithPopup(auth, provider);
      await handleSuccess(cred);
    } catch (err) {
      if (err.code !== "auth/popup-closed-by-user") {
        showError(friendlyError(err.code));
      }
    } finally {
      setLoading(false);
    }
  });
</script>

</body>
</html>
