<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — Chatbot Infraestructura</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────────── */
    #sidebar {
      width: 260px;
      min-width: 260px;
      background: #1a1a2e;
      color: #e5e7eb;
      display: flex;
      flex-direction: column;
      transition: width 0.25s, min-width 0.25s;
      overflow: hidden;
    }

    #sidebar.collapsed { width: 0; min-width: 0; }

    .sidebar-header {
      padding: 1.1rem 1rem 0.75rem;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9ca3af;
      border-bottom: 1px solid #2d2d44;
      white-space: nowrap;
    }

    #sidebar-history {
      flex: 1;
      overflow-y: auto;
      padding: 0.6rem 0;
    }

    .sidebar-item {
      padding: 0.55rem 1rem;
      font-size: 0.82rem;
      color: #d1d5db;
      border-bottom: 1px solid #2d2d44;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-item .si-role {
      font-size: 0.7rem;
      color: #6b7280;
      display: block;
      margin-top: 1px;
    }

    /* ── Main layout ─────────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: #fff;
    }

    /* ── Header ──────────────────────────────────────────────── */
    #chat-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.25rem;
      background: #4f46e5;
      color: #fff;
      flex-shrink: 0;
    }

    #btn-toggle-sidebar {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      padding: 0 0.25rem;
      flex-shrink: 0;
    }

    #header-title { font-size: 1rem; font-weight: 700; flex: 1; }

    #user-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.82rem;
    }

    #user-name { opacity: 0.9; }

    #role-badge {
      padding: 0.2rem 0.55rem;
      border-radius: 99px;
      font-size: 0.7rem;
      font-weight: 700;
      background: rgba(255,255,255,0.2);
    }

    #btn-logout {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.35);
      color: #fff;
      padding: 0.3rem 0.75rem;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      flex-shrink: 0;
    }

    #btn-logout:hover { background: rgba(255,255,255,0.25); }

    /* ── Messages area ───────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .bubble-row {
      display: flex;
      flex-direction: column;
    }

    .bubble-row.user  { align-items: flex-end; }
    .bubble-row.assistant { align-items: flex-start; }

    .bubble {
      max-width: 72%;
      padding: 0.65rem 1rem;
      border-radius: 14px;
      font-size: 0.92rem;
      line-height: 1.55;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .bubble-row.user .bubble {
      background: #4f46e5;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .bubble-row.assistant .bubble {
      background: #f3f4f6;
      color: #1a1a2e;
      border-bottom-left-radius: 4px;
    }

    .bubble-meta {
      font-size: 0.7rem;
      color: #9ca3af;
      margin-top: 0.25rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .badge-search {
      font-size: 0.68rem;
      background: #ede9fe;
      color: #5b21b6;
      padding: 0.1rem 0.45rem;
      border-radius: 99px;
      font-weight: 600;
    }

    /* Typing indicator */
    #typing-indicator {
      display: none;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.82rem;
      color: #6b7280;
      padding: 0 0.25rem;
    }

    #typing-indicator.visible { display: flex; }

    .dot {
      width: 7px; height: 7px;
      background: #9ca3af;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-5px); }
    }

    /* ── Bottom bar ──────────────────────────────────────────── */
    #bottom-bar {
      border-top: 1px solid #e5e7eb;
      padding: 0.85rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      flex-shrink: 0;
    }

    #chat-form {
      display: flex;
      gap: 0.5rem;
    }

    #chat-input {
      flex: 1;
      padding: 0.6rem 1rem;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      font-family: inherit;
      resize: none;
      height: 42px;
    }

    #chat-input:focus { border-color: #4f46e5; }

    #btn-send {
      padding: 0 1.1rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    #btn-send:disabled { opacity: 0.5; cursor: default; }
    #btn-send:hover:not(:disabled) { background: #4338ca; }

    #btn-clear {
      display: none;
      align-self: flex-start;
      background: none;
      border: none;
      color: #ef4444;
      font-size: 0.78rem;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
    }

    #btn-clear:hover { text-decoration: underline; }
    #btn-clear.visible { display: inline; }

    .bubble-error {
      background: #fef2f2 !important;
      color: #b91c1c !important;
      border: 1px solid #fca5a5;
      font-family: monospace;
      font-size: 0.8rem;
    }

    /* ── Empty state ─────────────────────────────────────────── */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #9ca3af;
      gap: 0.5rem;
      pointer-events: none;
    }

    #empty-state .icon { font-size: 2.5rem; }
    #empty-state p { font-size: 0.9rem; }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside id="sidebar">
  <div class="sidebar-header">Historial de sesión</div>
  <div id="sidebar-history"></div>
</aside>

<!-- Main panel -->
<div id="main">

  <!-- Header -->
  <header id="chat-header">
    <button id="btn-toggle-sidebar" title="Mostrar/ocultar panel">☰</button>
    <span id="header-title">Asistente Cloud</span>
    <div id="user-info">
      <span id="user-name"></span>
      <span id="role-badge"></span>
    </div>
    <button id="btn-logout">Cerrar sesión</button>
  </header>

  <!-- Messages -->
  <div id="messages">
    <div id="empty-state">
      <span class="icon">💬</span>
      <p>Empieza una conversación sobre infraestructura cloud</p>
    </div>
  </div>

  <!-- Typing indicator (outside messages so no scroll jump) -->
  <div id="typing-indicator" style="padding: 0 1.5rem 0.5rem;">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <span>Asistente está escribiendo…</span>
  </div>

  <!-- Input -->
  <div id="bottom-bar">
    <form id="chat-form">
      <textarea id="chat-input" placeholder="Escribe tu pregunta sobre cloud…" rows="1"></textarea>
      <button id="btn-send" type="submit">Enviar</button>
    </form>
    <button id="btn-clear">🗑 Borrar historial</button>
  </div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
